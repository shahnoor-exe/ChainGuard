services:
  # 1. Node.js Express Backend
  - type: web
    name: chainguard-api
    env: node
    plan: free
    rootDir: chainguard-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ML_ENGINE_URL
        value: "https://chainguard-ml.onrender.com"
      - key: NODE_ENV
        value: production

  # 2. Python FastAPI ML Engine
  - type: web
    name: chainguard-ml
    env: python
    plan: free
    rootDir: chainguard-ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
